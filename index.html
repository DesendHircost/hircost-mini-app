<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hircost Logistics</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
    padding:20px;
}

h1{
    margin-bottom:18px;
}

input, select{
    width:100%;
    box-sizing:border-box;
    padding:12px;
    margin-bottom:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.card{
    background:#1e293b;
    border-radius:14px;
    padding:16px;
    margin-bottom:14px;
    border-left:5px solid #64748b;
}

.card h3{
    margin-top:0;
}

.status{
    font-weight:bold;
    margin-top:10px;
}

.green{ color:#22c55e; }
.orange{ color:#f59e0b; }
.red{ color:#ef4444; }
.blue{ color:#3b82f6; }
.gray{ color:#94a3b8; }

.small{
    color:#cbd5e1;
    font-size:14px;
}

.counter{
    margin-bottom:12px;
    color:#cbd5e1;
}
</style>
</head>

<body>

<h1>📦 Hircost Logistics</h1>

<input type="text" id="search" placeholder="Поиск: спецификация, товар, ТК">

<select id="statusFilter">
    <option value="">Все статусы</option>
    <option value="В пути">В пути</option>
    <option value="Принята">Принята</option>
    <option value="Задержка">Задержка</option>
</select>

<div class="counter" id="counter"></div>
<div id="shipments"></div>

<script>
const SHEET_URL =
"https://docs.google.com/spreadsheets/d/1mmW-HwveJCRQFIFCEHjj7mfJ2-2WqwvEaDokI4VQFQs/export?format=csv&gid=1362126320";

let shipmentsData = [];

function parseCSV(text){
    const rows = [];
    let row = [];
    let cell = "";
    let insideQuotes = false;

    for(let i = 0; i < text.length; i++){
        const char = text[i];
        const next = text[i + 1];

        if(char === '"' && insideQuotes && next === '"'){
            cell += '"';
            i++;
        } else if(char === '"'){
            insideQuotes = !insideQuotes;
        } else if(char === "," && !insideQuotes){
            row.push(cell);
            cell = "";
        } else if((char === "\n" || char === "\r") && !insideQuotes){
            if(cell || row.length){
                row.push(cell);
                rows.push(row);
                row = [];
                cell = "";
            }
        } else {
            cell += char;
        }
    }

    if(cell || row.length){
        row.push(cell);
        rows.push(row);
    }

    return rows;
}

async function loadShipments(){
    const response = await fetch(SHEET_URL);
    const csv = await response.text();

    const rows = parseCSV(csv);

    shipmentsData = rows
        .slice(1)
        .map(cols => ({
            status: clean(cols[0]),
            spec: clean(cols[1]),
            item: clean(cols[4]),
            transport: clean(cols[10]),
            date: clean(cols[12]),
            qty: clean(cols[5]),
            weight: clean(cols[7]),
            sum: clean(cols[11])
        }))
        .filter(item => item.spec);

    applyFilters();
}

function clean(value){
    if(value === undefined || value === null) return "";
    return String(value).trim();
}

function getStatusClass(status){
    const s = status.toLowerCase();

    if(s === "принята") return "green";
    if(s === "в пути") return "orange";
    if(s === "задержка") return "red";

    return "gray";
}

function renderShipments(data){
    const container = document.getElementById("shipments");
    const counter = document.getElementById("counter");

    container.innerHTML = "";
    counter.innerText = `Найдено поставок: ${data.length}`;

    if(data.length === 0){
        container.innerHTML = `<p class="small">Ничего не найдено.</p>`;
        return;
    }

    data.forEach(item => {
        const statusClass = getStatusClass(item.status);

        container.innerHTML += `
            <div class="card">
                <h3>📦 ${item.spec}</h3>

                <p><b>Товар:</b> ${item.item || "-"}</p>
                <p><b>ТК:</b> ${item.transport || "-"}</p>
                <p><b>Срок:</b> ${item.date || "-"}</p>
                <p><b>Кол-во:</b> ${item.qty || "-"}</p>
                <p><b>Вес:</b> ${item.weight || "-"}</p>
                <p><b>Сумма транспорта:</b> ${item.sum || "-"}</p>

                <div class="status ${statusClass}">
                    ${item.status || "Без статуса"}
                </div>
            </div>
        `;
    });
}

function applyFilters(){
    const searchValue = document
        .getElementById("search")
        .value
        .toLowerCase()
        .trim();

    const statusValue = document
        .getElementById("statusFilter")
        .value
        .trim();

    let filtered = shipmentsData;

    if(searchValue){
        filtered = filtered.filter(item =>
            item.spec.toLowerCase().includes(searchValue) ||
            item.item.toLowerCase().includes(searchValue) ||
            item.transport.toLowerCase().includes(searchValue)
        );
    }

    if(statusValue){
        filtered = filtered.filter(item =>
            item.status === statusValue
        );
    }

    renderShipments(filtered);
}

document
    .getElementById("search")
    .addEventListener("input", applyFilters);

document
    .getElementById("statusFilter")
    .addEventListener("change", applyFilters);

loadShipments();
</script>

</body>
</html>
