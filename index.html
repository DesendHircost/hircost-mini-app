<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hircost Logistics</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
*{
    box-sizing:border-box;
}

html, body{
    overscroll-behavior-y:none;
}

body{
    margin:0;
    padding:16px;
    background:#d7d8da;
    color:#111827;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

body.tg-mode{
    padding-top:calc(env(safe-area-inset-top, 0px) + 104px);
}

/* ОБЩАЯ ПЛАВНОСТЬ КНОПОК */

button,
.doc-btn,
.copy-btn,
.action-btn,
.filter-chip,
.round-btn{
    transition:
        transform 0.12s ease,
        background 0.18s ease,
        opacity 0.18s ease,
        box-shadow 0.18s ease;
}

button:active,
.doc-btn:active,
.copy-btn:active,
.action-btn:active,
.filter-chip:active,
.round-btn:active{
    transform:scale(0.97);
}

/* ПЛАСТИНКА */

.bg-disc{
    position:fixed;
    width:760px;
    height:760px;
    right:-260px;
    top:-170px;
    border-radius:50%;

    background:
        radial-gradient(circle at 50% 50%,
            rgba(235,246,255,0.95) 0%,
            rgba(130,190,220,0.85) 28%,
            rgba(25,35,42,0.95) 58%,
            rgba(5,8,10,0.98) 100%);

    border:18px solid rgba(12,16,20,0.9);

    box-shadow:
        0 0 0 8px rgba(255,255,255,0.18),
        0 30px 90px rgba(0,0,0,0.35);

    animation:spin 38s linear infinite;
    z-index:0;
    opacity:0.72;
}

.bg-disc::before{
    content:"";
    position:absolute;
    inset:90px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.28);
}

.bg-disc::after{
    content:"";
    position:absolute;
    inset:220px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.22);
    box-shadow:0 0 0 80px rgba(255,255,255,0.04);
}

@keyframes spin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

.wrapper{
    position:relative;
    z-index:2;
}

/* ВЕРХ */

.header{
    position:relative;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;

    padding:14px 14px;
    border-radius:22px;

    background:linear-gradient(135deg, rgba(15,118,110,0.96), rgba(12,74,110,0.96));
    border:1px solid rgba(255,255,255,0.20);
    backdrop-filter:blur(14px);
    box-shadow:0 12px 34px rgba(0,0,0,0.18);
    touch-action:pan-y;
    user-select:none;
    overflow:hidden;
}

.header-title-block{
    min-width:0;
    transition:opacity 0.18s ease, transform 0.18s ease;
}

.brand-switcher{
    display:flex;
    gap:4px;
    margin-top:7px;
    padding:3px;
    width:max-content;
    border-radius:10px;
    background:rgba(255,255,255,0.14);
}

.brand-tab{
    border:none;
    border-radius:7px;
    padding:5px 9px;
    background:transparent;
    color:rgba(255,255,255,0.68);
    font-size:11px;
    font-weight:700;
    cursor:pointer;
}

.brand-tab.active{
    background:rgba(255,255,255,0.94);
    color:#0f766e;
}

h1{
    margin:0;
    font-size:24px;
    line-height:1.15;
    color:white;
    font-weight:800;
    letter-spacing:-0.4px;
}

.header-actions{
    display:flex;
    gap:8px;
    align-items:center;
    transition:opacity 0.18s ease, transform 0.18s ease;
}

.round-btn{
    width:44px;
    height:44px;
    min-width:44px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,0.92);
    color:#0f172a;
    font-size:18px;
    box-shadow:0 8px 24px rgba(0,0,0,0.16);
}

/* ПОИСК В HEADER */

.header-search{
    position:absolute;
    inset:14px;
    z-index:4;
    display:flex;
    align-items:center;
    gap:8px;
    opacity:0;
    visibility:hidden;
    pointer-events:none;
    transform:translateX(14px) scaleX(0.96);
    transform-origin:right center;
    transition:opacity 0.18s ease, transform 0.2s ease, visibility 0.18s ease;
}

.header.search-open .header-search{
    opacity:1;
    visibility:visible;
    pointer-events:auto;
    transform:translateX(0) scaleX(1);
}

.header.search-open .header-title-block,
.header.search-open .header-actions{
    opacity:0;
    pointer-events:none;
    transform:translateX(-12px);
}

.header-search input{
    flex:1;
    min-width:0;
    height:46px;
    margin:0;
    padding:0 14px;
    border:1px solid rgba(255,255,255,0.34);
    border-radius:14px;
    background:rgba(255,255,255,0.96);
    color:#0f172a;
    box-shadow:0 8px 22px rgba(0,0,0,0.14);
    font-size:15px;
}

.header-search input::-webkit-search-cancel-button{
    display:none;
}

.header-search-close{
    width:42px;
    height:42px;
    min-width:42px;
    border:1px solid rgba(255,255,255,0.24);
    border-radius:50%;
    background:rgba(255,255,255,0.16);
    color:white;
    font-size:25px;
    line-height:1;
    cursor:pointer;
}

input, select{
    width:100%;
    padding:12px;
    border:1px solid rgba(17,24,39,0.12);
    border-radius:12px;
    margin-bottom:10px;
    background:rgba(255,255,255,0.78);
    color:#111827;
    font-size:15px;
    outline:none;
}

/* УПРАВЛЕНИЕ */

.top-actions{
    display:flex;
    gap:10px;
    overflow:visible;
    padding-bottom:8px;
    margin-bottom:10px;
}

.status-filter-control{
    position:relative;
    flex:0 0 auto;
}

.status-filter-button{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    min-width:142px;
}

.status-filter-chevron{
    color:#64748b;
    font-size:15px;
    transition:transform 0.16s ease;
}

.status-filter-button[aria-expanded="true"] .status-filter-chevron{
    transform:rotate(180deg);
}

.status-dropdown{
    position:absolute;
    top:calc(100% + 6px);
    left:0;
    z-index:45;
    width:190px;
    padding:6px;
    border:1px solid rgba(17,24,39,0.10);
    border-radius:14px;
    background:rgba(255,255,255,0.96);
    box-shadow:0 16px 36px rgba(15,23,42,0.16);
    backdrop-filter:blur(12px);
    opacity:0;
    visibility:hidden;
    pointer-events:none;
    transform:translateY(-6px);
    transition:opacity 0.16s ease, transform 0.16s ease, visibility 0.16s ease;
}

.status-dropdown.active{
    opacity:1;
    visibility:visible;
    pointer-events:auto;
    transform:translateY(0);
}

.status-option{
    display:block;
    width:100%;
    border:none;
    border-radius:9px;
    padding:10px 11px;
    background:transparent;
    color:#334155;
    font-size:13px;
    font-weight:700;
    text-align:left;
    cursor:pointer;
}

.status-option:hover{
    background:#f1f5f4;
}

.status-option.active{
    background:#dff1ee;
    color:#0f766e;
}

.action-btn{
    border:none;
    border-radius:14px;
    padding:11px 14px;
    background:rgba(255,255,255,0.78);
    color:#111827;
    font-size:14px;
    font-weight:700;
    white-space:nowrap;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.controls-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:10px;
}

.shipment-controls{
    grid-template-columns:minmax(220px, 360px);
}

.main-section-switcher{
    display:flex;
    gap:4px;
    width:max-content;
    margin:0 0 12px;
    padding:3px;
    border-radius:12px;
    background:rgba(255,255,255,0.58);
}

.main-section-tab{
    border:none;
    border-radius:9px;
    padding:8px 12px;
    background:transparent;
    color:#64748b;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
}

.main-section-tab.active{
    background:#0f766e;
    color:white;
}

.hidden{
    display:none !important;
}

/* ВЕРХНИЕ ПОКАЗАТЕЛИ */

.summary{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:8px;
    margin-bottom:10px;
}

.summary-card{
    min-width:190px;
    background:rgba(255,255,255,0.74);
    border:1px solid rgba(17,24,39,0.12);
    border-radius:16px;
    padding:14px;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.summary-card span{
    display:block;
    color:#6b7280;
    font-size:12px;
    margin-bottom:5px;
}

.summary-card b{
    font-size:22px;
    color:#111827;
}

.counter{
    color:#4b5563;
    font-size:13px;
    margin-bottom:12px;
}

/* КАРТОЧКИ */

.card{
    background:rgba(255,255,255,0.76);
    border:1px solid rgba(17,24,39,0.12);
    border-left:7px solid #9ca3af;
    border-radius:16px;
    margin-bottom:10px;
    overflow:hidden;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    transition:
        box-shadow 0.18s ease,
        transform 0.18s ease;
}

.card.accepted{
    border-left-color:#16a34a;
}

.card.in-transit{
    border-left-color:#f59e0b;
}

.card.delayed{
    border-left-color:#dc2626;
}

.card.overdue{
    border-left-color:#7f1d1d;
}

.card-header{
    padding:14px;
    cursor:pointer;
}

.card-title{
    font-size:16px;
    font-weight:bold;
    margin-bottom:8px;
    color:#111827;
}

.card-subtitle{
    font-size:13px;
    color:#4b5563;
    line-height:1.35;
}

.card-body{
    max-height:0;
    opacity:0;
    overflow:hidden;
    padding:0 14px;
    border-top:1px solid rgba(17,24,39,0.08);
    transform:translateY(-4px);
    transition:
        max-height 0.22s ease,
        opacity 0.18s ease,
        transform 0.18s ease,
        padding 0.18s ease;
}

.card.open .card-body{
    max-height:1200px;
    opacity:1;
    padding:0 14px 14px 14px;
    transform:translateY(0);
}

.row{
    display:flex;
    justify-content:space-between;
    gap:10px;
    padding:8px 0;
    border-bottom:1px solid rgba(17,24,39,0.07);
    font-size:14px;
}

.row span:first-child{
    color:#6b7280;
}

.row b{
    color:#111827;
    text-align:right;
}

.status{
    display:inline-block;
    margin-top:10px;
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
}

.green{
    background:#dcfce7;
    color:#166534;
}

.orange{
    background:#fef3c7;
    color:#92400e;
}

.red{
    background:#fee2e2;
    color:#991b1b;
}

.gray{
    background:#e5e7eb;
    color:#374151;
}

.burgundy{
    background:#fee2e2;
    color:#7f1d1d;
}

/* ОПЛАТЫ */

.pay-badge{
    display:inline-block;
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
    white-space:nowrap;
}

.pay-paid{
    background:#dcfce7;
    color:#166534;
}

.pay-unpaid{
    background:#fee2e2;
    color:#991b1b;
}

/* ДОКУМЕНТЫ */

.documents-block{
    margin-top:16px;
    padding:12px;
    border-radius:14px;
    background:rgba(17,24,39,0.06);
    border:1px solid rgba(17,24,39,0.08);
}

.documents-title{
    font-size:14px;
    font-weight:bold;
    color:#111827;
    margin-bottom:10px;
}

.doc-buttons{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.doc-btn{
    display:block;
    color:white;
    padding:11px 12px;
    border-radius:12px;
    text-decoration:none;
    font-size:14px;
    text-align:center;
    font-weight:bold;
}

.doc-spec{
    background:#111827;
}

.doc-invoice{
    background:#1f2937;
}

.doc-transport{
    background:#374151;
}

/* КОПИРОВАНИЕ */

.copy-btn{
    width:100%;
    margin-top:14px;
    border:none;
    border-radius:12px;
    padding:11px 12px;
    background:#0f172a;
    color:white;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
}

/* FLOAT ATTENTION */

.attention-float{
    position:fixed;
    right:18px;
    bottom:20px;
    width:58px;
    height:58px;
    border:none;
    border-radius:50%;
    background:#b91c1c;
    color:white;
    font-size:28px;
    font-weight:900;
    z-index:30;
    box-shadow:0 16px 36px rgba(127,29,29,0.35);
}

.attention-badge{
    position:absolute;
    top:-6px;
    right:-6px;
    min-width:24px;
    height:24px;
    padding:0 6px;
    border-radius:999px;
    background:#111827;
    color:white;
    font-size:12px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* MODAL */

.modal{
    position:fixed;
    inset:0;
    z-index:80;
    background:rgba(17,24,39,0);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding:12px;
    opacity:0;
    pointer-events:none;
    transition:
        opacity 0.2s ease,
        background 0.2s ease;
}

.modal.active{
    opacity:1;
    pointer-events:auto;
    background:rgba(17,24,39,0.55);
}

.modal-content{
    width:100%;
    max-height:88vh;
    background:#f8fafc;
    border-radius:22px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 24px 80px rgba(0,0,0,0.30);
    transform:translateY(18px);
    transition:transform 0.22s ease;
}

.modal.active .modal-content{
    transform:translateY(0);
}

.modal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding:14px;
    background:#0f766e;
    color:white;
}

.modal-title{
    font-size:16px;
    font-weight:800;
}

.modal-close{
    border:none;
    border-radius:12px;
    padding:9px 12px;
    background:#b91c1c;
    color:white;
    font-weight:bold;
}

.modal-body{
    padding:14px;
    overflow:auto;
}

/* ФИНАНСЫ */

.finance-summary{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:10px;
    margin-bottom:12px;
}

.finance-summary-card,
.finance-card{
    background:rgba(255,255,255,0.76);
    border:1px solid rgba(17,24,39,0.12);
    border-radius:16px;
    padding:13px;
    backdrop-filter:blur(12px);
    box-shadow:0 8px 24px rgba(0,0,0,0.07);
}

.finance-summary-card span{
    display:block;
    min-height:30px;
    color:#6b7280;
    font-size:12px;
    line-height:1.3;
}

.finance-summary-card b{
    display:block;
    margin-top:5px;
    color:#111827;
    font-size:18px;
}

.finance-period{
    margin:-2px 0 12px;
    color:#4b5563;
    font-size:12px;
}

.finance-section{
    margin-top:16px;
}

.finance-section-title{
    margin:0 0 8px;
    color:#111827;
    font-size:16px;
}

.finance-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
    gap:10px;
}

.finance-card-title{
    margin-bottom:9px;
    color:#0f766e;
    font-size:15px;
    font-weight:800;
}

.finance-metric{
    display:flex;
    justify-content:space-between;
    gap:10px;
    padding:6px 0;
    border-bottom:1px solid rgba(17,24,39,0.07);
    font-size:13px;
}

.finance-metric:last-child{
    border-bottom:none;
}

.finance-metric span{
    color:#6b7280;
}

.finance-metric b{
    color:#111827;
    text-align:right;
}

.finance-gate-content{
    max-width:360px;
}

.finance-pin-display{
    min-height:44px;
    margin-bottom:10px;
    color:#0f766e;
    font-size:24px;
    font-weight:800;
    letter-spacing:0;
    text-align:center;
}

.finance-pin-error{
    min-height:20px;
    margin-bottom:8px;
    color:#b91c1c;
    font-size:13px;
    font-weight:700;
    text-align:center;
}

.finance-numpad{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:8px;
}

.finance-key{
    min-height:52px;
    border:none;
    border-radius:12px;
    background:#e5e7eb;
    color:#111827;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
}

.finance-key.confirm{
    background:#0f766e;
    color:white;
    font-size:14px;
}

/* ФИЛЬТРЫ В МОДАЛКЕ */

.filter-section{
    margin-bottom:16px;
}

.filter-section-title{
    font-size:14px;
    font-weight:800;
    margin-bottom:8px;
    color:#111827;
}

.chip-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.filter-chip{
    border:none;
    border-radius:999px;
    padding:10px 14px;
    background:#e5e7eb;
    color:#111827;
    font-size:13px;
    white-space:nowrap;
    cursor:pointer;
}

.filter-chip.active{
    background:#111827;
    color:white;
}

/* СПИСОК ПРОБЛЕМ */

.issue-item{
    background:white;
    border-radius:16px;
    padding:12px;
    margin-bottom:10px;
    border:1px solid rgba(17,24,39,0.08);
}

.issue-title{
    font-size:15px;
    font-weight:800;
    margin-bottom:8px;
    color:#111827;
}

.issue-list{
    margin:0;
    padding-left:18px;
    color:#7f1d1d;
    font-size:13px;
    line-height:1.45;
}

/* КАЛЕНДАРЬ */

.calendar-controls{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}

.calendar-month{
    font-size:16px;
    font-weight:800;
}

.calendar-nav{
    border:none;
    border-radius:12px;
    padding:9px 12px;
    background:#111827;
    color:white;
    font-weight:bold;
}

.calendar-grid{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:6px;
}

.calendar-weekday{
    text-align:center;
    font-size:12px;
    color:#6b7280;
    font-weight:bold;
    padding:6px 0;
}

.calendar-day{
    min-height:42px;
    border:none;
    border-radius:14px;
    background:white;
    color:#111827;
    font-size:14px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:2px;
    transition:background 0.16s ease, color 0.16s ease, transform 0.12s ease, box-shadow 0.16s ease;
}

.calendar-day:not(.empty-day):hover{
    background:#edf5f4;
}

.calendar-day-number{
    line-height:1;
}

.calendar-day-count{
    min-width:16px;
    height:16px;
    padding:0 4px;
    border-radius:999px;
    background:rgba(255,255,255,0.22);
    color:inherit;
    font-size:9px;
    line-height:16px;
}

.calendar-day.has-arrival::after{
    display:none;
}

.calendar-day.today:not(.has-arrival){
    box-shadow:inset 0 0 0 2px rgba(15,118,110,0.42);
    color:#0f766e;
    font-weight:800;
}

.calendar-day.empty-day{
    background:transparent;
}

.calendar-day.has-arrival{
    background:#0f766e;
    color:white;
    font-weight:800;
}

.calendar-day.has-arrival::after{
    content:"";
    position:absolute;
    left:50%;
    bottom:6px;
    width:6px;
    height:6px;
    transform:translateX(-50%);
    border-radius:50%;
    background:white;
}

.calendar-day.selected{
    outline:none;
    box-shadow:0 0 0 3px rgba(185,28,28,0.28);
    transform:translateY(-1px);
}

.calendar-specs{
    margin-top:14px;
}

.calendar-spec{
    background:white;
    border-radius:14px;
    padding:10px 12px;
    margin-bottom:8px;
    font-size:14px;

function updateHeaderSearchUI(){

}

function closeHeaderSearch(clear = true, shouldApply = true){
    const input = document.getElementById("search");

    if(clear){
        input.value = "";
    }

    isSearchOpen = false;
    updateHeaderSearchUI();
    input.blur();

    if(clear && shouldApply){
        applyFilters();
    }
}

function toggleStatusDropdown(event){
    event.stopPropagation();

    const dropdown = document.getElementById("statusDropdown");
    const button = document.getElementById("statusFilterButton");
    const isOpen = dropdown.classList.toggle("active");

    button.setAttribute("aria-expanded", String(isOpen));
}

function closeStatusDropdown(){
    document.getElementById("statusDropdown").classList.remove("active");
    document
        .getElementById("statusFilterButton")
        .setAttribute("aria-expanded", "false");
}

function updateStatusFilterUI(){
    document.getElementById("statusFilterLabel").innerText =
        `Статус: ${selectedStatus || "Все"}`;

    document.querySelectorAll(".status-option").forEach(button => {
        button.classList.toggle(
            "active",

        );

function updateBrandUI(){

    document.querySelectorAll(".brand-tab").forEach(button => {
        button.classList.toggle("active", button.dataset.brand === activeBrand);
    });

    document
        .getElementById("mainSectionSwitcher")
        .classList.toggle("hidden", activeBrand !== "hircost");

function updateMainSectionUI(){
    const showFinance =

    document
        .getElementById("shipmentsSection")
        .classList.toggle("hidden", showFinance);

    document
        .getElementById("financeSection")
        .classList.toggle("hidden", !showFinance);

    document
        .getElementById("attentionButton")

    document.querySelectorAll(".main-section-tab").forEach(button => {
        button.classList.toggle(

            button.dataset.section === activeMainSection

        if(!financeUnlocked){

    activeMainSection = section === "finance" ? "finance" : "shipments";
    updateMainSectionUI();

    if(activeMainSection === "finance"){
        loadFinanceData();
    }
}

    if(!SHEETS[brand] || brand === activeBrand){
        return;

    activeBrand = brand;

    if(activeBrand !== "hircost"){

    resetBrandFilters();
    updateBrandUI();

function clean(value){
    if(value === undefined || value === null){
        return "";
    }

    return String(value).trim();
}

function normalize(value){
    return clean(value).toLowerCase();
}

function escapeHtml(value){
    return clean(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function escapeAttr(value){
    return escapeHtml(value);
}

function getField(obj, names){
    for(const name of names){
        if(obj[name] !== undefined){
            return obj[name];
        }
    }

    const keys = Object.keys(obj);

    for(const name of names){
        const found = keys.find(k =>
            normalize(k) === normalize(name)
        );

        if(found){
            return obj[found];
        }
    }

    return "";
}

function parseNumber(value){
    if(!value){
        return 0;
    }

    return Number(
        String(value)
            .replace(/\s/g, "")
            .replace(",", ".")
            .replace(/[^\d.]/g, "")
    ) || 0;
}

function parseDate(value){
    const text = clean(value);

    const match = text.match(/(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{2,4})/);

    if(!match){
        return null;
    }

    let day = Number(match[1]);
    let month = Number(match[2]) - 1;
    let year = Number(match[3]);

    if(year < 100){
        year += 2000;
    }

    const date = new Date(year, month, day);
    date.setHours(0,0,0,0);

    return date;
}

function formatDateKey(date){
    const day = String(date.getDate()).padStart(2, "0");
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const year = date.getFullYear();

    return `${day}.${month}.${year}`;
}

function todayDate(){
    const date = new Date();
    date.setHours(0,0,0,0);
    return date;
}

function diffDaysFromToday(value){
    const date = parseDate(value);

    if(!date){
        return null;
    }

    const diff = date.getTime() - todayDate().getTime();

    return Math.round(diff / 86400000);
}

function parseCSV(text){
    const rows = [];

    let row = [];
    let cell = "";
    let insideQuotes = false;

    for(let i = 0; i < text.length; i++){
        const char = text[i];
        const next = text[i + 1];

        if(char === '"' && insideQuotes && next === '"'){
            cell += '"';
            i++;
        }

        else if(char === '"'){
            insideQuotes = !insideQuotes;
        }

        else if(char === "," && !insideQuotes){
            row.push(cell);
            cell = "";
        }

        else if((char === "\n" || char === "\r") && !insideQuotes){
            if(cell || row.length){
                row.push(cell);
                rows.push(row);
                row = [];
                cell = "";
            }
        }

        else{
            cell += char;
        }
    }

    if(cell || row.length){
        row.push(cell);
        rows.push(row);
    }

    return rows;
}

function findFinanceRow(rows, label){
    const target = normalize(label);

    return rows.findIndex(row =>
        normalize(row[0]).includes(target)
    );
}

function parseFinanceSection(rows, title){
    const sectionIndex = findFinanceRow(rows, title);

    if(sectionIndex < 0 || !rows[sectionIndex + 1]){
        return [];
    }

    const headers = rows[sectionIndex + 1].map(clean);
    const result = [];

    for(let i = sectionIndex + 2; i < rows.length; i++){
        const row = rows[i];

        if(!row.some(cell => clean(cell))){
            break;
        }

        const item = {};

        headers.forEach((header, index) => {
            if(header){
                item[header] = clean(row[index]);
            }
        });

        if(Object.values(item).some(Boolean)){
            result.push(item);
        }
    }

    return result;
}

function combineFinanceRubles(values){
    if(!values.some(value => clean(value))){
        return "";
    }

    const total = values.reduce((sum, value) =>
        sum + parseNumber(value), 0
    );

    return `${total.toLocaleString("ru-RU")} ₽`;
}

function normalizeFinancePayable(items){
    return items.map(item => ({
        ...item,
        "К оплате / в пути": getField(item, [
            "К оплате / в пути",
            "К оплате"
        ])
    }));
}

function parseFinanceReport(rows){
    const totalsIndex = rows.findIndex(row =>
        row.some(cell => normalize(cell) === "итого потребность")
    );
    const totalHeaders = totalsIndex >= 0 ? rows[totalsIndex] : [];
    const totalValues = totalsIndex >= 0 ? (rows[totalsIndex + 1] || []) : [];
    const rawTotals = {};

    totalHeaders.forEach((header, index) => {
        if(clean(header)){
            rawTotals[clean(header)] = clean(totalValues[index]);
        }
    });

    const legacyPayable = getField(rawTotals, ["К оплате / в пути"]);
    const totals = {
        ...rawTotals,
        "К оплате / в пути": legacyPayable || combineFinanceRubles([
            getField(rawTotals, ["Транспорт в пути"]),
            getField(rawTotals, ["К оплате по транспорту"])
        ])
    };

    const periodIndex = findFinanceRow(rows, "Период");
    const periodRow = periodIndex >= 0 ? rows[periodIndex] : [];
    const updatedIndex = periodRow.findIndex(cell => normalize(cell) === "обновлено");

    const dynamics = normalizeFinancePayable(
        parseFinanceSection(rows, "Динамика по месяцам")
    );
    const routes = normalizeFinancePayable(
        parseFinanceSection(rows, "Расходы по маршрутам")
    );
    const carriers = parseFinanceSection(
        rows,
        "Средняя цена за кг по транспортным компаниям"
    );

    return {
        period: clean(periodRow[1]),
        updated: updatedIndex >= 0 ? clean(periodRow[updatedIndex + 1]) : "",
        totals,
        dynamics,
        routes,
        carriers,
        months: dynamics.map(item => clean(item["Месяц"])).filter(Boolean)
    };
}

function financeValue(value){
    return clean(value) || "—";
}

function isEmptyFinanceValue(value){
    if(value === undefined || value === null){
        return true;
    }

    const normalized = clean(value)
        .toLowerCase()
        .replace(/\s/g, "");

    return [
        "",
        "-",
        "0",
        "0₽",
        "0кг",
        "0%",
        "0,00",
        "0.00"
    ].includes(normalized);
}

function hasAnyFinanceData(item, keys){
    return keys.some(key => !isEmptyFinanceValue(item[key]));
}

function renderFinanceMetrics(metrics){

        <div class="finance-metric">
            <span>${escapeHtml(label)}</span>
            <b>${escapeHtml(financeValue(value))}</b>
        </div>
    `).join("");
}

async function loadFinanceData(){
    if(financeData || financeLoading){
        if(financeData){
            renderFinanceDashboard();
        }
        return;
    }

    financeLoading = true;
    document.getElementById("financeContent").innerHTML =
        `<div class="empty">Загрузка бюджета логистики...</div>`;

    try{
        const response = await fetch(FINANCE_URL);

        if(!response.ok){
            throw new Error(`HTTP ${response.status}`);
        }

        const rows = parseCSV(await response.text());
        const report = parseFinanceReport(rows);

        if(
            report.dynamics.length === 0 &&
            report.routes.length === 0 &&
            report.carriers.length === 0
        ){
            throw new Error("Секции финансового отчёта не найдены");
        }

        financeData = report;
        renderFinanceDashboard();
    }
    catch(error){
        console.error("Не удалось загрузить бюджет логистики:", error);
        financeData = null;
        document.getElementById("financeContent").innerHTML =
            `<div class="empty">Не удалось загрузить бюджет логистики</div>`;
    }
    finally{
        financeLoading = false;
    }
}

                readyDate: getField(obj, [

                ]),

                arrivalDate: getField(obj, [
                    "Дата прихода/Срок"
                ]),

                priceKg: getField(obj, [

                ]),

                specPayment: getField(obj, [
                    "оплата по спецификации",
                    "Оплата по спецификации"
                ]),

                transportPayment: getField(obj, [

                specPdf: getField(obj, [

function getStatusClass(status){
    const s = normalize(status);

    if(s === "принята"){
        return "green";
    }

    if(s === "в пути"){
        return "orange";
    }

    if(s === "задерживается"){
        return "red";
    }

    return "gray";
}

function isInTransitStatus(status){
    const s = normalize(status);

    return (
        s === "в пути" ||
        s === "задерживается"
    );
}

function isAccepted(item){
    return normalize(item.status) === "принята";
}

function isDelayed(item){
    return normalize(item.status) === "задерживается";
}

function isOverdue(item){
    const days = diffDaysFromToday(item.arrivalDate);

    return (
        days !== null &&
        days < 0 &&
        !isAccepted(item)
    );
}

function isPaid(value){
    const v = normalize(value);

    return (
        v === "оплачено" ||
        v === "оплачен" ||
        v === "да" ||
        v === "paid" ||
        v === "+"
    );
}

function paymentBadge(value){
    const text = clean(value) || "Не оплачено";

    if(isPaid(text)){
        return `<span class="pay-badge pay-paid">${escapeHtml(text)}</span>`;
    }

    return `<span class="pay-badge pay-unpaid">${escapeHtml(text)}</span>`;
}

function getIssues(item){
    const issues = [];

    if(isDelayed(item)){
        issues.push("Статус: задерживается");
    }

    if(isOverdue(item)){
        issues.push(`Просрочка: ${Math.abs(diffDaysFromToday(item.arrivalDate))} дн.`);
    }

    if(activeBrand === "hircost"){
        if(!isPaid(item.specPayment)){
            issues.push("Не оплачена спецификация");
        }

        if(!isPaid(item.transportPayment)){
            issues.push("Не оплачена транспортная");
        }
    }

    return issues;
}

function isAttention(item){
    return getIssues(item).length > 0;
}

function getDaysLabel(item){
    const days = diffDaysFromToday(item.arrivalDate);

    if(days === null){
        return "срок не указан";
    }

    if(isAccepted(item)){
        return "принята";
    }

    if(days > 0){
        return `осталось ${days} дн.`;
    }

    if(days === 0){
        return "сегодня";
    }

    return `просрочка ${Math.abs(days)} дн.`;
}

function getCardStateClass(item){
    if(isOverdue(item)){
        return "overdue";
    }

    if(isDelayed(item)){
        return "delayed";
    }

    if(normalize(item.status) === "в пути"){
        return "in-transit";
    }

    if(isAccepted(item)){
        return "accepted";
    }

    return "";
}

function getStatusBadgeClass(item){
    if(isOverdue(item)){
        return "burgundy";
    }

    return getStatusClass(item.status);
}

function formatSpecTitle(spec){
    const value = clean(spec);

    if(/^спецификация/i.test(value)){
        return value.replace(/спецификация\s*№?\s*/i, "Спецификация №");
    }

    return `Спецификация №${value}`;
}

                        href="${escapeAttr(item.specPdf)}"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="doc-btn doc-spec"
                    >
                        📄 Спецификация PDF
                    </a>
                ` : ""}

                ${item.invoicePdf ? `
                    <a
                        href="${escapeAttr(item.invoicePdf)}"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="doc-btn doc-invoice"
                    >
                        📦 Накладная PDF
                    </a>
                ` : ""}

                ${item.transportPdf ? `
                    <a
                        href="${escapeAttr(item.transportPdf)}"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="doc-btn doc-transport"
                    >
                        🚚 Документы ТК
                    </a>
                ` : ""}

            </div>
        </div>
    `;
}

function renderCard(item, cardId){
    renderedItems[cardId] = item;

    const statusBadgeClass = getStatusBadgeClass(item);

    const cardStateClass = getCardStateClass(item);

    const specTitle = formatSpecTitle(item.spec);

    const daysLabel = getDaysLabel(item);

    const badgeText = isOverdue(item)
        ? "Просрочка"
        : item.status;

    const paymentRows = activeBrand === "hircost" ? `
        <div class="row">
            <span>Оплата по спецификации</span>
            <b>${paymentBadge(item.specPayment)}</b>
        </div>

        <div class="row">
            <span>Оплата за транспорт</span>
            <b>${paymentBadge(item.transportPayment)}</b>
        </div>
    ` : "";

    return `
        <div class="card ${cardStateClass}" id="card-${cardId}">
            <div
                class="card-header"
                onclick="toggleCard('${cardId}')"
            >
                <div class="card-title">
                    ${escapeHtml(specTitle)}
                </div>

                <div class="card-subtitle">
                    ${escapeHtml(item.status)} · ${escapeHtml(item.arrivalDate)} · ${escapeHtml(daysLabel)}
                </div>

                <div class="status ${statusBadgeClass}">
                    ${escapeHtml(badgeText)}
                </div>
            </div>

            <div class="card-body">

                <div class="row">
                    <span>Товар</span>
                    <b>${escapeHtml(item.item || "-")}</b>
                </div>

                <div class="row">
                    <span>Кол-во</span>
                    <b>${escapeHtml(item.qty || "-")}</b>
                </div>

                <div class="row">
                    <span>Вес</span>
                    <b>${escapeHtml(item.weight || "-")}</b>
                </div>

                <div class="row">
                    <span>ТК</span>
                    <b>${escapeHtml(item.transport || "-")}</b>
                </div>

                <div class="row">
                    <span>Сумма транспорта</span>
                    <b>${escapeHtml(item.transportSum || "-")}</b>
                </div>

                <div class="row">
                    <span>Дата готовности</span>
                    <b>${escapeHtml(item.readyDate || "-")}</b>
                </div>

                <div class="row">
                    <span>Дата прихода/срок</span>
                    <b>${escapeHtml(item.arrivalDate || "-")}</b>
                </div>

                <div class="row">
                    <span>Дней до прихода</span>
                    <b>${escapeHtml(daysLabel)}</b>
                </div>

                <div class="row">
                    <span>Цена за кг</span>
                    <b>${escapeHtml(item.priceKg || "-")}</b>
                </div>

                ${paymentRows}

                ${documentsBlock(item)}

                <button
                    class="copy-btn"
                    onclick="copyShipment('${cardId}')"
                >
                    📋 Скопировать карточку
                </button>

            </div>
        </div>
    `;
}

function sortData(data){
    const sorted = [...data];

    sorted.sort((a,b) => {
        const da = parseDate(a.readyDate) || parseDate(a.arrivalDate);
        const db = parseDate(b.readyDate) || parseDate(b.arrivalDate);

        if(!da && !db) return 0;
        if(!da) return 1;
        if(!db) return -1;

        return db - da;
    });

    return sorted;
}

function renderList(data){
    const container = document.getElementById("shipments");

    container.innerHTML = "";

    data.forEach((item, index) => {
        container.innerHTML += renderCard(item, `list-${index}`);
    });
}

function renderShipments(data){
    const counter = document.getElementById("counter");

    const sorted = sortData(data);

    renderedItems = {};

    counter.innerText = `Найдено: ${sorted.length}`;

    updateSummary();
    updateAttentionBadge();

    if(sorted.length === 0){
        const message = shipmentsData.length === 0
            ? emptyStateMessage
            : "Ничего не найдено";

        document.getElementById("shipments").innerHTML =
        `<div class="empty">${message}</div>`;

        return;
    }

    renderList(sorted);
}

function toggleCard(cardId){
    const card = document.getElementById(`card-${cardId}`);

    card.classList.toggle("open");
}

function getPaymentMatch(item, filter){
    if(filter === "spec-paid"){
        return isPaid(item.specPayment);
    }

    if(filter === "spec-unpaid"){
        return !isPaid(item.specPayment);
    }

    if(filter === "tk-paid"){
        return isPaid(item.transportPayment);
    }

    if(filter === "tk-unpaid"){
        return !isPaid(item.transportPayment);
    }

    return false;
}

function applyFilters(){
    const searchValue =
    document
        .getElementById("search")
        .value
        .toLowerCase()
        .trim();

    const transportValue =
    document
        .getElementById("transportFilter")
        .value
        .trim();

    let filtered = shipmentsData;

    if(searchValue){
        filtered = filtered.filter(item =>
            item.spec.toLowerCase().includes(searchValue) ||
            item.item.toLowerCase().includes(searchValue) ||
            item.transport.toLowerCase().includes(searchValue)
        );
    }

    if(selectedStatus){
        filtered = filtered.filter(item =>
            normalize(item.status) === normalize(selectedStatus)
        );
    }

    if(transportValue){
        filtered = filtered.filter(item =>
            item.transport === transportValue
        );
    }

    renderShipments(filtered);
}

function copyShipment(cardId){
    const item = renderedItems[cardId];

    if(!item){
        return;
    }

    const specTitle = formatSpecTitle(item.spec);

    const textLines = [
        specTitle,
        `Товар: ${item.item || "-"}`,
        `Статус: ${item.status || "-"}`,
        `ТК: ${item.transport || "-"}`,
        `Дата прихода: ${item.arrivalDate || "-"}`,
        `Дней до прихода: ${getDaysLabel(item)}`,
        `Кол-во: ${item.qty || "-"}`,
        `Вес: ${item.weight || "-"}`,
        `Сумма транспорта: ${item.transportSum || "-"}`
    ];

    if(activeBrand === "hircost"){
        textLines.push(
            `Оплата по спецификации: ${item.specPayment || "Не оплачено"}`,
            `Оплата за транспорт: ${item.transportPayment || "Не оплачено"}`
        );
    }

    const text = textLines.join("\n");

    if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text)
            .then(showToast)
            .catch(() => fallbackCopy(text));
    } else {
        fallbackCopy(text);
    }
}

function fallbackCopy(text){
    const textarea = document.createElement("textarea");

    textarea.value = text;

    document.body.appendChild(textarea);

    textarea.select();

    document.execCommand("copy");

    document.body.removeChild(textarea);

    showToast();
}

function showToast(){
    const toast = document.getElementById("toast");

    toast.classList.add("active");

    setTimeout(() => {
        toast.classList.remove("active");
    }, 1500);
}

/* КАЛЕНДАРЬ */

function changeCalendarMonth(direction){
    calendarDate.setMonth(calendarDate.getMonth() + direction);
    renderCalendar();
}

function renderCalendar(){
    const title = document.getElementById("calendarMonthTitle");
    const grid = document.getElementById("calendarGrid");
    const specs = document.getElementById("calendarSpecs");

    const monthName = calendarDate.toLocaleString("ru-RU", {
        month:"long",
        year:"numeric"
    });

    title.innerText =
        monthName.charAt(0).toUpperCase() + monthName.slice(1);

    grid.innerHTML = "";
    specs.innerHTML = "";

    const weekdays = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

    weekdays.forEach(day => {
        grid.innerHTML += `<div class="calendar-weekday">${day}</div>`;
    });

    const year = calendarDate.getFullYear();
    const month = calendarDate.getMonth();

    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);

    let startOffset = firstDay.getDay() - 1;
    if(startOffset < 0){
        startOffset = 6;
    }

    for(let i = 0; i < startOffset; i++){
        grid.innerHTML += `<button class="calendar-day empty-day"></button>`;
    }

    for(let day = 1; day <= lastDay.getDate(); day++){
        const date = new Date(year, month, day);
        date.setHours(0,0,0,0);

        const key = formatDateKey(date);

        const arrivals = shipmentsData.filter(item =>
            clean(item.arrivalDate) === key
        );

        const hasArrival = arrivals.length > 0;
        const isToday = date.getTime() === todayDate().getTime();

        grid.innerHTML += `
            <button
                class="calendar-day ${hasArrival ? "has-arrival" : ""} ${isToday ? "today" : ""}"
                onclick="selectCalendarDay('${key}', event)"
            >
                <span class="calendar-day-number">${day}</span>
                ${hasArrival ? `<span class="calendar-day-count">${arrivals.length}</span>` : ""}
            </button>
        `;
    }
}

function selectCalendarDay(dateKey, event){
    document
        .querySelectorAll(".calendar-day")
        .forEach(day => day.classList.remove("selected"));

    event.currentTarget.classList.add("selected");

    const specs = document.getElementById("calendarSpecs");

    const arrivals = shipmentsData.filter(item =>
        clean(item.arrivalDate) === dateKey
    );

    if(arrivals.length === 0){
        specs.innerHTML =
        `<div class="empty">На эту дату поставок нет</div>`;
        return;
    }

    specs.innerHTML = "";

    arrivals.forEach(item => {
        specs.innerHTML += `
            <div class="calendar-spec">
                <div class="calendar-spec-title">
                    ${escapeHtml(formatSpecTitle(item.spec))}
                </div>
                <div class="calendar-spec-meta">
                    ${escapeHtml(item.status || "Статус не указан")} · ${escapeHtml(item.weight || "Вес не указан")}
                </div>
            </div>
        `;
    });
}

document
    .querySelectorAll(".status-option")
    .forEach(button => {
        button.addEventListener("click", event => {
            event.stopPropagation();
            selectStatus(button.dataset.statusValue);
        });
    });

document.addEventListener("click", event => {
    if(!document.getElementById("statusFilterControl").contains(event.target)){
        closeStatusDropdown();
    }

    if(
        isSearchOpen &&
        !document.getElementById("search").value &&
        !event.target.closest(".header")
    ){
        closeHeaderSearch(false);
    }
});

document.addEventListener("keydown", event => {
    if(event.key === "Escape"){
        closeStatusDropdown();

        if(isSearchOpen){
            closeHeaderSearch(true);
        }

        closeModal("calendarModal");
    }
});

document
    .getElementById("search")
    .addEventListener("input", applyFilters);

document
    .getElementById("transportFilter")
    .addEventListener("change", applyFilters);

document.querySelectorAll(".brand-tab").forEach(button => {
    button.addEventListener("click", () => {
        switchBrand(button.dataset.brand);
    });
});

document.querySelectorAll(".main-section-tab").forEach(button => {
    button.addEventListener("click", () => {
        switchMainSection(button.dataset.section);
    });
});

document.getElementById("calendarModal").addEventListener("click", event => {
    if(event.target === event.currentTarget){
        closeModal("calendarModal");
    }
});

const header = document.querySelector(".header");
let headerTouchStartX = null;

header.addEventListener("touchstart", event => {
    headerTouchStartX = event.changedTouches[0].clientX;
}, {passive:true});

header.addEventListener("touchend", event => {
    if(headerTouchStartX === null){
        return;
    }

    const swipeDistance = event.changedTouches[0].clientX - headerTouchStartX;
    headerTouchStartX = null;

    if(swipeDistance < -50){
        switchBrand("lancet");
    }
    else if(swipeDistance > 50){
        switchBrand("hircost");
    }
}, {passive:true});

loadShipments();

</script>
