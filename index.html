<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hircost Logistics</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:16px;
    background:#d7d8da;
    color:#111827;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

/* Отступ под верхнюю панель Telegram */
body.tg-mode{
    padding-top:calc(env(safe-area-inset-top, 0px) + 104px);
}

/* ПЛАСТИНКА */

.bg-disc{
    position:fixed;
    width:760px;
    height:760px;
    right:-260px;
    top:-170px;
    border-radius:50%;

    background:
        radial-gradient(circle at 50% 50%,
            rgba(235,246,255,0.95) 0%,
            rgba(130,190,220,0.85) 28%,
            rgba(25,35,42,0.95) 58%,
            rgba(5,8,10,0.98) 100%);

    border:18px solid rgba(12,16,20,0.9);

    box-shadow:
        0 0 0 8px rgba(255,255,255,0.18),
        0 30px 90px rgba(0,0,0,0.35);

    animation:spin 38s linear infinite;
    z-index:0;
    opacity:0.72;
}

.bg-disc::before{
    content:"";
    position:absolute;
    inset:90px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.28);
}

.bg-disc::after{
    content:"";
    position:absolute;
    inset:220px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.22);
    box-shadow:0 0 0 80px rgba(255,255,255,0.04);
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

.wrapper{
    position:relative;
    z-index:2;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;

    padding:14px 14px;
    border-radius:22px;

    background:rgba(255,255,255,0.82);
    border:1px solid rgba(17,24,39,0.10);
    backdrop-filter:blur(14px);
    box-shadow:0 12px 34px rgba(0,0,0,0.12);
}

h1{
    margin:0;
    font-size:24px;
    line-height:1.15;
    color:#111827;
    font-weight:800;
    letter-spacing:-0.4px;
}

.search-btn{
    width:44px;
    height:44px;
    min-width:44px;
    border:none;
    border-radius:50%;
    background:#111827;
    color:white;
    font-size:18px;
    box-shadow:0 8px 24px rgba(0,0,0,0.18);
}

.search-box{
    display:none;
    margin-bottom:10px;
}

.search-box.active{
    display:block;
}

input, select{
    width:100%;
    padding:12px;
    border:1px solid rgba(17,24,39,0.12);
    border-radius:12px;
    margin-bottom:10px;
    background:rgba(255,255,255,0.78);
    color:#111827;
    font-size:15px;
    outline:none;
}

/* ТРЕБУЮТ ВНИМАНИЯ */

.attention-block{
    margin-bottom:12px;
    padding:14px;
    border-radius:18px;
    background:rgba(254,226,226,0.82);
    border:1px solid rgba(153,27,27,0.18);
    box-shadow:0 10px 28px rgba(0,0,0,0.08);
    backdrop-filter:blur(12px);
}

.attention-top{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:center;
}

.attention-title{
    font-size:15px;
    font-weight:800;
    color:#991b1b;
}

.attention-count{
    font-size:24px;
    font-weight:900;
    color:#991b1b;
}

.attention-details{
    margin-top:6px;
    color:#7f1d1d;
    font-size:12px;
    line-height:1.45;
}

/* ПЕРЕКЛЮЧАТЕЛИ */

.chip-row{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:8px;
    margin-bottom:10px;
}

.filter-chip,
.view-chip{
    border:none;
    border-radius:999px;
    padding:10px 14px;
    background:rgba(255,255,255,0.7);
    color:#111827;
    font-size:13px;
    white-space:nowrap;
    cursor:pointer;
    transition:0.2s;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.filter-chip.active,
.view-chip.active{
    background:#111827;
    color:white;
}

.controls-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:10px;
}

/* ВЕРХНИЕ ПОКАЗАТЕЛИ */

.summary{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:8px;
    margin-bottom:10px;
}

.summary-card{
    min-width:190px;
    background:rgba(255,255,255,0.74);
    border:1px solid rgba(17,24,39,0.12);
    border-radius:16px;
    padding:14px;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.summary-card span{
    display:block;
    color:#6b7280;
    font-size:12px;
    margin-bottom:5px;
}

.summary-card b{
    font-size:22px;
    color:#111827;
}

.counter{
    color:#4b5563;
    font-size:13px;
    margin-bottom:12px;
}

/* КАРТОЧКИ */

.card{
    background:rgba(255,255,255,0.76);
    border:1px solid rgba(17,24,39,0.12);
    border-left:7px solid #9ca3af;
    border-radius:16px;
    margin-bottom:10px;
    overflow:hidden;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.card.accepted{
    border-left-color:#16a34a;
}

.card.in-transit{
    border-left-color:#f59e0b;
}

.card.delayed{
    border-left-color:#dc2626;
}

.card.overdue{
    border-left-color:#7f1d1d;
}

.card-header{
    padding:14px;
    cursor:pointer;
}

.card-title{
    font-size:16px;
    font-weight:bold;
    margin-bottom:8px;
    color:#111827;
}

.card-subtitle{
    font-size:13px;
    color:#4b5563;
    line-height:1.35;
}

.card-body{
    display:none;
    padding:0 14px 14px 14px;
    border-top:1px solid rgba(17,24,39,0.08);
}

.card.open .card-body{
    display:block;
}

.row{
    display:flex;
    justify-content:space-between;
    gap:10px;
    padding:8px 0;
    border-bottom:1px solid rgba(17,24,39,0.07);
    font-size:14px;
}

.row span:first-child{
    color:#6b7280;
}

.row b{
    color:#111827;
    text-align:right;
}

.status{
    display:inline-block;
    margin-top:10px;
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
}

.green{
    background:#dcfce7;
    color:#166534;
}

.orange{
    background:#fef3c7;
    color:#92400e;
}

.red{
    background:#fee2e2;
    color:#991b1b;
}

.gray{
    background:#e5e7eb;
    color:#374151;
}

.burgundy{
    background:#fee2e2;
    color:#7f1d1d;
}

/* ОПЛАТЫ */

.pay-badge{
    display:inline-block;
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
    white-space:nowrap;
}

.pay-paid{
    background:#dcfce7;
    color:#166534;
}

.pay-unpaid{
    background:#fee2e2;
    color:#991b1b;
}

/* ДОКУМЕНТЫ */

.documents-block{
    margin-top:16px;
    padding:12px;
    border-radius:14px;
    background:rgba(17,24,39,0.06);
    border:1px solid rgba(17,24,39,0.08);
}

.documents-title{
    font-size:14px;
    font-weight:bold;
    color:#111827;
    margin-bottom:10px;
}

.doc-buttons{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.doc-btn{
    display:block;
    color:white;
    padding:11px 12px;
    border-radius:12px;
    text-decoration:none;
    font-size:14px;
    text-align:center;
    font-weight:bold;
}

.doc-spec{
    background:#111827;
}

.doc-invoice{
    background:#1f2937;
}

.doc-transport{
    background:#374151;
}

/* КОПИРОВАНИЕ */

.copy-btn{
    width:100%;
    margin-top:14px;
    border:none;
    border-radius:12px;
    padding:11px 12px;
    background:#0f172a;
    color:white;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
}

.toast{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    background:#111827;
    color:white;
    padding:10px 14px;
    border-radius:999px;
    font-size:13px;
    z-index:99;
    opacity:0;
    pointer-events:none;
    transition:0.2s;
}

.toast.active{
    opacity:1;
}

/* КАЛЕНДАРЬ */

.calendar-group{
    margin-bottom:16px;
}

.calendar-date{
    margin:14px 0 10px 0;
    padding:10px 12px;
    border-radius:14px;
    background:rgba(17,24,39,0.82);
    color:white;
    font-size:14px;
    font-weight:bold;
    backdrop-filter:blur(12px);
}

.empty{
    color:#6b7280;
    text-align:center;
    margin-top:30px;
}

@media (max-width:600px){
    body.tg-mode{
        padding-top:calc(env(safe-area-inset-top, 0px) + 112px);
    }

    .bg-disc{
        width:620px;
        height:620px;
        right:-320px;
        top:-180px;
        opacity:0.55;
    }

    .summary-card{
        min-width:170px;
    }

    .controls-grid{
        grid-template-columns:1fr;
    }

    h1{
        font-size:22px;
    }
}
</style>
</head>

<body>

<div class="bg-disc"></div>

<div class="wrapper">

<div class="header">
    <h1>Hircost поставки</h1>

    <button
        class="search-btn"
        onclick="toggleSearch()"
    >
        🔎
    </button>
</div>

<div class="search-box" id="searchBox">
    <input
        type="text"
        id="search"
        placeholder="Поиск: спецификация, товар, ТК"
    >
</div>

<div class="attention-block">
    <div class="attention-top">
        <div class="attention-title">Требуют внимания:</div>
        <div class="attention-count" id="attentionCount">0</div>
    </div>
    <div class="attention-details" id="attentionDetails"></div>
</div>

<div class="chip-row">
    <button class="view-chip active" data-view="list">📋 Список</button>
    <button class="view-chip" data-view="calendar">📅 Календарь</button>
</div>

<div class="chip-row">
    <button class="filter-chip" data-status="В пути">В пути</button>
    <button class="filter-chip" data-status="Принята">Принята</button>
    <button class="filter-chip" data-status="Задерживается">Задерживается</button>
</div>

<div class="chip-row">
    <button class="filter-chip payment-chip" data-payment="spec-paid">Спец. оплачена</button>
    <button class="filter-chip payment-chip" data-payment="spec-unpaid">Спец. не оплачена</button>
    <button class="filter-chip payment-chip" data-payment="tk-paid">ТК оплачена</button>
    <button class="filter-chip payment-chip" data-payment="tk-unpaid">ТК не оплачена</button>
</div>

<div class="controls-grid">
    <select id="sortSelect">
        <option value="nearest">Сначала ближайшие</option>
        <option value="newest">Сначала новые</option>
        <option value="delays">Сначала задержки</option>
        <option value="unpaid">Сначала неоплаченные</option>
    </select>

    <select id="transportFilter">
        <option value="">Все ТК</option>
    </select>
</div>

<div class="summary">
    <div class="summary-card">
        <span>Штук в пути</span>
        <b id="qtyInTransit">0</b>
    </div>

    <div class="summary-card">
        <span>Поставок в пути</span>
        <b id="countInTransit">0</b>
    </div>

    <div class="summary-card">
        <span>Сумма транспорта в пути</span>
        <b id="transportSumTransit">0 ₽</b>
    </div>
</div>

<div class="counter" id="counter"></div>

<div id="shipments"></div>

</div>

<div class="toast" id="toast">Скопировано</div>

<script>

function initTelegramMiniApp(){
    const tg = window.Telegram?.WebApp;

    if(!tg){
        return;
    }

    document.body.classList.add("tg-mode");

    tg.ready();
    tg.expand();

    try{
        tg.setHeaderColor("#b91c1c");
        tg.setBackgroundColor("#d7d8da");
    } catch(error){
        console.log("Theme color error:", error);
    }

    if(tg.requestFullscreen){
        try{
            tg.requestFullscreen();
        } catch(error){
            console.log("Fullscreen error:", error);
        }
    }
}

window.addEventListener("load", initTelegramMiniApp);

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/1mmW-HwveJCRQFIFCEHjj7mfJ2-2WqwvEaDokI4VQFQs/export?format=csv&gid=1362126320";

let shipmentsData = [];
let selectedStatuses = [];
let selectedPaymentFilters = [];
let currentView = "list";
let renderedItems = {};

function toggleSearch(){
    document
        .getElementById("searchBox")
        .classList
        .toggle("active");
}

function clean(value){
    if(value === undefined || value === null){
        return "";
    }

    return String(value).trim();
}

function normalize(value){
    return clean(value).toLowerCase();
}

function escapeHtml(value){
    return clean(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function escapeAttr(value){
    return escapeHtml(value);
}

function getField(obj, names){
    for(const name of names){
        if(obj[name] !== undefined){
            return obj[name];
        }
    }

    const keys = Object.keys(obj);

    for(const name of names){
        const found = keys.find(k =>
            normalize(k) === normalize(name)
        );

        if(found){
            return obj[found];
        }
    }

    return "";
}

function parseNumber(value){
    if(!value){
        return 0;
    }

    return Number(
        String(value)
            .replace(/\s/g, "")
            .replace(",", ".")
            .replace(/[^\d.]/g, "")
    ) || 0;
}

function parseDate(value){
    const text = clean(value);

    const match = text.match(/(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{2,4})/);

    if(!match){
        return null;
    }

    let day = Number(match[1]);
    let month = Number(match[2]) - 1;
    let year = Number(match[3]);

    if(year < 100){
        year += 2000;
    }

    const date = new Date(year, month, day);
    date.setHours(0,0,0,0);

    return date;
}

function todayDate(){
    const date = new Date();
    date.setHours(0,0,0,0);
    return date;
}

function diffDaysFromToday(value){
    const date = parseDate(value);

    if(!date){
        return null;
    }

    const diff = date.getTime() - todayDate().getTime();

    return Math.round(diff / 86400000);
}

function parseCSV(text){
    const rows = [];

    let row = [];
    let cell = "";
    let insideQuotes = false;

    for(let i = 0; i < text.length; i++){
        const char = text[i];
        const next = text[i + 1];

        if(char === '"' && insideQuotes && next === '"'){
            cell += '"';
            i++;
        }

        else if(char === '"'){
            insideQuotes = !insideQuotes;
        }

        else if(char === "," && !insideQuotes){
            row.push(cell);
            cell = "";
        }

        else if((char === "\n" || char === "\r") && !insideQuotes){
            if(cell || row.length){
                row.push(cell);
                rows.push(row);
                row = [];
                cell = "";
            }
        }

        else{
            cell += char;
        }
    }

    if(cell || row.length){
        row.push(cell);
        rows.push(row);
    }

    return rows;
}

async function loadShipments(){
    const response = await fetch(SHEET_URL);

    const csv = await response.text();

    const rows = parseCSV(csv);

    const headers = rows[0];

    shipmentsData = rows
        .slice(1)
        .map(cols => {
            const obj = {};

            headers.forEach((header, index) => {
                obj[clean(header)] = clean(cols[index]);
            });

            return {
                status: getField(obj, ["Статус"]),

                spec: getField(obj, ["Спецификация"]),

                item: getField(obj, ["Товар"]),

                qty: getField(obj, ["Общее кол-во в заказе"]),

                weight: getField(obj, [
                    "Вес по накладной, КГ",
                    "Вес по накладной, кг"
                ]),

                transport: getField(obj, [
                    "Транспортная компания"
                ]),

                transportSum: getField(obj, [
                    "Сумма за транспорт"
                ]),

                readyDate: getField(obj, [
                    "Дата готовности/отгрузки"
                ]),

                arrivalDate: getField(obj, [
                    "Дата прихода/Срок"
                ]),

                priceKg: getField(obj, [
                    "Цена за кг"
                ]),

                specPayment: getField(obj, [
                    "оплата по спецификации",
                    "Оплата по спецификации"
                ]),

                transportPayment: getField(obj, [
                    "Оплата за транспорт",
                    "оплата за транспорт"
                ]),

                specPdf: getField(obj, [
                    "пдф спецификация",
                    "ПДФ спецификация",
                    "PDF спецификация",
                    "pdf спецификация"
                ]),

                invoicePdf: getField(obj, [
                    "пдф накладная",
                    "ПДФ накладная",
                    "PDF накладная",
                    "pdf накладная"
                ]),

                transportPdf: getField(obj, [
                    "пдф документы транспортной",
                    "ПДФ документы транспортной",
                    "PDF документы транспортной",
                    "pdf документы транспортной"
                ])
            };
        })
        .filter(item => item.spec);

    fillTransportFilter();
    applyFilters();
}

function getStatusClass(status){
    const s = normalize(status);

    if(s === "принята"){
        return "green";
    }

    if(s === "в пути"){
        return "orange";
    }

    if(s === "задерживается"){
        return "red";
    }

    return "gray";
}

function isInTransitStatus(status){
    const s = normalize(status);

    return (
        s === "в пути" ||
        s === "задерживается"
    );
}

function isAccepted(item){
    return normalize(item.status) === "принята";
}

function isDelayed(item){
    return normalize(item.status) === "задерживается";
}

function isOverdue(item){
    const days = diffDaysFromToday(item.arrivalDate);

    return (
        days !== null &&
        days < 0 &&
        !isAccepted(item)
    );
}

function isPaid(value){
    const v = normalize(value);

    return (
        v === "оплачено" ||
        v === "оплачен" ||
        v === "да" ||
        v === "paid" ||
        v === "+"
    );
}

function paymentBadge(value){
    const text = clean(value) || "Не оплачено";

    if(isPaid(text)){
        return `<span class="pay-badge pay-paid">${escapeHtml(text)}</span>`;
    }

    return `<span class="pay-badge pay-unpaid">${escapeHtml(text)}</span>`;
}

function isAttention(item){
    return (
        isDelayed(item) ||
        isOverdue(item) ||
        !isPaid(item.specPayment) ||
        !isPaid(item.transportPayment)
    );
}

function getDaysLabel(item){
    const days = diffDaysFromToday(item.arrivalDate);

    if(days === null){
        return "срок не указан";
    }

    if(isAccepted(item)){
        return "принята";
    }

    if(days > 0){
        return `осталось ${days} дн.`;
    }

    if(days === 0){
        return "сегодня";
    }

    return `просрочка ${Math.abs(days)} дн.`;
}

function getCardStateClass(item){
    if(isOverdue(item)){
        return "overdue";
    }

    if(isDelayed(item)){
        return "delayed";
    }

    if(normalize(item.status) === "в пути"){
        return "in-transit";
    }

    if(isAccepted(item)){
        return "accepted";
    }

    return "";
}

function getStatusBadgeClass(item){
    if(isOverdue(item)){
        return "burgundy";
    }

    return getStatusClass(item.status);
}

function formatSpecTitle(spec){
    const value = clean(spec);

    if(/^спецификация/i.test(value)){
        return value.replace(/спецификация\s*№?\s*/i, "Спецификация №");
    }

    return `Спецификация №${value}`;
}

function updateSummary(){
    const inTransit = shipmentsData.filter(item =>
        isInTransitStatus(item.status)
    );

    const qty = inTransit.reduce((sum, item) =>
        sum + parseNumber(item.qty), 0
    );

    const transportSum = inTransit.reduce((sum, item) =>
        sum + parseNumber(item.transportSum), 0
    );

    document
        .getElementById("qtyInTransit")
        .innerText =
        qty.toLocaleString("ru-RU");

    document
        .getElementById("countInTransit")
        .innerText =
        inTransit.length;

    document
        .getElementById("transportSumTransit")
        .innerText =
        transportSum.toLocaleString("ru-RU") + " ₽";
}

function updateAttention(){
    const attention = shipmentsData.filter(isAttention);

    const delayed = shipmentsData.filter(isDelayed).length;

    const overdue = shipmentsData.filter(isOverdue).length;

    const specUnpaid = shipmentsData.filter(item =>
        !isPaid(item.specPayment)
    ).length;

    const transportUnpaid = shipmentsData.filter(item =>
        !isPaid(item.transportPayment)
    ).length;

    document
        .getElementById("attentionCount")
        .innerText =
        attention.length;

    document
        .getElementById("attentionDetails")
        .innerText =
        `Задерживаются: ${delayed} · Просрочка: ${overdue} · Спец. не оплачено: ${specUnpaid} · ТК не оплачена: ${transportUnpaid}`;
}

function fillTransportFilter(){
    const select = document.getElementById("transportFilter");

    const currentValue = select.value;

    const transports = Array.from(
        new Set(
            shipmentsData
                .map(item => clean(item.transport))
                .filter(Boolean)
        )
    ).sort((a,b) => a.localeCompare(b, "ru"));

    select.innerHTML = `<option value="">Все ТК</option>`;

    transports.forEach(transport => {
        select.innerHTML += `
            <option value="${escapeAttr(transport)}">
                ${escapeHtml(transport)}
            </option>
        `;
    });

    select.value = currentValue;
}

function documentsBlock(item){
    if(!item.specPdf && !item.invoicePdf && !item.transportPdf){
        return "";
    }

    return `
        <div class="documents-block">
            <div class="documents-title">Документы</div>

            <div class="doc-buttons">

                ${item.specPdf ? `
                    <a
                        href="${escapeAttr(item.specPdf)}"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="doc-btn doc-spec"
                    >
                        📄 Спецификация PDF
                    </a>
                ` : ""}

                ${item.invoicePdf ? `
                    <a
                        href="${escapeAttr(item.invoicePdf)}"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="doc-btn doc-invoice"
                    >
                        📦 Накладная PDF
                    </a>
                ` : ""}

                ${item.transportPdf ? `
                    <a
                        href="${escapeAttr(item.transportPdf)}"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="doc-btn doc-transport"
                    >
                        🚚 Документы ТК
                    </a>
                ` : ""}

            </div>
        </div>
    `;
}

function renderCard(item, cardId){
    renderedItems[cardId] = item;

    const statusBadgeClass = getStatusBadgeClass(item);

    const cardStateClass = getCardStateClass(item);

    const specTitle = formatSpecTitle(item.spec);

    const daysLabel = getDaysLabel(item);

    const badgeText = isOverdue(item)
        ? "Просрочка"
        : item.status;

    return `
        <div class="card ${cardStateClass}" id="card-${cardId}">
            <div
                class="card-header"
                onclick="toggleCard('${cardId}')"
            >
                <div class="card-title">
                    ${escapeHtml(specTitle)}
                </div>

                <div class="card-subtitle">
                    ${escapeHtml(item.status)} · ${escapeHtml(item.arrivalDate)} · ${escapeHtml(daysLabel)}
                </div>

                <div class="status ${statusBadgeClass}">
                    ${escapeHtml(badgeText)}
                </div>
            </div>

            <div class="card-body">

                <div class="row">
                    <span>Товар</span>
                    <b>${escapeHtml(item.item || "-")}</b>
                </div>

                <div class="row">
                    <span>Кол-во</span>
                    <b>${escapeHtml(item.qty || "-")}</b>
                </div>

                <div class="row">
                    <span>Вес</span>
                    <b>${escapeHtml(item.weight || "-")}</b>
                </div>

                <div class="row">
                    <span>ТК</span>
                    <b>${escapeHtml(item.transport || "-")}</b>
                </div>

                <div class="row">
                    <span>Сумма транспорта</span>
                    <b>${escapeHtml(item.transportSum || "-")}</b>
                </div>

                <div class="row">
                    <span>Дата готовности</span>
                    <b>${escapeHtml(item.readyDate || "-")}</b>
                </div>

                <div class="row">
                    <span>Дата прихода/срок</span>
                    <b>${escapeHtml(item.arrivalDate || "-")}</b>
                </div>

                <div class="row">
                    <span>Дней до прихода</span>
                    <b>${escapeHtml(daysLabel)}</b>
                </div>

                <div class="row">
                    <span>Цена за кг</span>
                    <b>${escapeHtml(item.priceKg || "-")}</b>
                </div>

                <div class="row">
                    <span>Оплата по спецификации</span>
                    <b>${paymentBadge(item.specPayment)}</b>
                </div>

                <div class="row">
                    <span>Оплата за транспорт</span>
                    <b>${paymentBadge(item.transportPayment)}</b>
                </div>

                ${documentsBlock(item)}

                <button
                    class="copy-btn"
                    onclick="copyShipment('${cardId}')"
                >
                    📋 Скопировать карточку
                </button>

            </div>
        </div>
    `;
}

function sortData(data){
    const sortValue = document.getElementById("sortSelect").value;

    const sorted = [...data];

    if(sortValue === "nearest"){
        sorted.sort((a,b) => {
            const da = parseDate(a.arrivalDate);
            const db = parseDate(b.arrivalDate);

            if(!da && !db) return 0;
            if(!da) return 1;
            if(!db) return -1;

            return da - db;
        });
    }

    if(sortValue === "newest"){
        sorted.sort((a,b) => {
            const da = parseDate(a.readyDate) || parseDate(a.arrivalDate);
            const db = parseDate(b.readyDate) || parseDate(b.arrivalDate);

            if(!da && !db) return 0;
            if(!da) return 1;
            if(!db) return -1;

            return db - da;
        });
    }

    if(sortValue === "delays"){
        sorted.sort((a,b) => {
            const av = (isDelayed(a) ? 2 : 0) + (isOverdue(a) ? 3 : 0);
            const bv = (isDelayed(b) ? 2 : 0) + (isOverdue(b) ? 3 : 0);

            return bv - av;
        });
    }

    if(sortValue === "unpaid"){
        sorted.sort((a,b) => {
            const av = (!isPaid(a.specPayment) ? 1 : 0) + (!isPaid(a.transportPayment) ? 1 : 0);
            const bv = (!isPaid(b.specPayment) ? 1 : 0) + (!isPaid(b.transportPayment) ? 1 : 0);

            return bv - av;
        });
    }

    return sorted;
}

function renderList(data){
    const container = document.getElementById("shipments");

    container.innerHTML = "";

    data.forEach((item, index) => {
        container.innerHTML += renderCard(item, `list-${index}`);
    });
}

function renderCalendar(data){
    const container = document.getElementById("shipments");

    container.innerHTML = "";

    const groups = {};

    data.forEach(item => {
        const key = item.arrivalDate || "Без даты";

        if(!groups[key]){
            groups[key] = [];
        }

        groups[key].push(item);
    });

    const keys = Object.keys(groups).sort((a,b) => {
        const da = parseDate(a);
        const db = parseDate(b);

        if(!da && !db) return a.localeCompare(b, "ru");
        if(!da) return 1;
        if(!db) return -1;

        return da - db;
    });

    let cardCounter = 0;

    keys.forEach(dateKey => {
        container.innerHTML += `
            <div class="calendar-group">
                <div class="calendar-date">
                    ${escapeHtml(dateKey)}
                </div>
            </div>
        `;

        groups[dateKey].forEach(item => {
            container.innerHTML += renderCard(item, `cal-${cardCounter}`);
            cardCounter++;
        });
    });
}

function renderShipments(data){
    const counter = document.getElementById("counter");

    const sorted = sortData(data);

    renderedItems = {};

    counter.innerText = `Найдено: ${sorted.length}`;

    updateSummary();
    updateAttention();

    if(sorted.length === 0){
        document.getElementById("shipments").innerHTML =
        `<div class="empty">Ничего не найдено</div>`;

        return;
    }

    if(currentView === "calendar"){
        renderCalendar(sorted);
    } else {
        renderList(sorted);
    }
}

function toggleCard(cardId){
    const card = document.getElementById(`card-${cardId}`);

    card.classList.toggle("open");
}

function getPaymentMatch(item, filter){
    if(filter === "spec-paid"){
        return isPaid(item.specPayment);
    }

    if(filter === "spec-unpaid"){
        return !isPaid(item.specPayment);
    }

    if(filter === "tk-paid"){
        return isPaid(item.transportPayment);
    }

    if(filter === "tk-unpaid"){
        return !isPaid(item.transportPayment);
    }

    return false;
}

function applyFilters(){
    const searchValue =
    document
        .getElementById("search")
        .value
        .toLowerCase()
        .trim();

    const transportValue =
    document
        .getElementById("transportFilter")
        .value
        .trim();

    let filtered = shipmentsData;

    if(searchValue){
        filtered = filtered.filter(item =>
            item.spec.toLowerCase().includes(searchValue) ||
            item.item.toLowerCase().includes(searchValue) ||
            item.transport.toLowerCase().includes(searchValue)
        );
    }

    if(selectedStatuses.length > 0){
        filtered = filtered.filter(item =>
            selectedStatuses.includes(item.status)
        );
    }

    if(selectedPaymentFilters.length > 0){
        filtered = filtered.filter(item =>
            selectedPaymentFilters.some(filter =>
                getPaymentMatch(item, filter)
            )
        );
    }

    if(transportValue){
        filtered = filtered.filter(item =>
            item.transport === transportValue
        );
    }

    renderShipments(filtered);
}

function toggleStatus(status, button){
    if(selectedStatuses.includes(status)){
        selectedStatuses =
        selectedStatuses.filter(s => s !== status);

        button.classList.remove("active");
    }

    else{
        selectedStatuses.push(status);

        button.classList.add("active");
    }

    applyFilters();
}

function togglePaymentFilter(filter, button){
    if(selectedPaymentFilters.includes(filter)){
        selectedPaymentFilters =
        selectedPaymentFilters.filter(f => f !== filter);

        button.classList.remove("active");
    }

    else{
        selectedPaymentFilters.push(filter);

        button.classList.add("active");
    }

    applyFilters();
}

function setView(view, button){
    currentView = view;

    document
        .querySelectorAll(".view-chip")
        .forEach(btn => btn.classList.remove("active"));

    button.classList.add("active");

    applyFilters();
}

function copyShipment(cardId){
    const item = renderedItems[cardId];

    if(!item){
        return;
    }

    const specTitle = formatSpecTitle(item.spec);

    const text = [
        specTitle,
        `Товар: ${item.item || "-"}`,
        `Статус: ${item.status || "-"}`,
        `ТК: ${item.transport || "-"}`,
        `Дата прихода: ${item.arrivalDate || "-"}`,
        `Дней до прихода: ${getDaysLabel(item)}`,
        `Кол-во: ${item.qty || "-"}`,
        `Вес: ${item.weight || "-"}`,
        `Сумма транспорта: ${item.transportSum || "-"}`,
        `Оплата по спецификации: ${item.specPayment || "Не оплачено"}`,
        `Оплата за транспорт: ${item.transportPayment || "Не оплачено"}`
    ].join("\n");

    if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text)
            .then(showToast)
            .catch(() => fallbackCopy(text));
    } else {
        fallbackCopy(text);
    }
}

function fallbackCopy(text){
    const textarea = document.createElement("textarea");

    textarea.value = text;

    document.body.appendChild(textarea);

    textarea.select();

    document.execCommand("copy");

    document.body.removeChild(textarea);

    showToast();
}

function showToast(){
    const toast = document.getElementById("toast");

    toast.classList.add("active");

    setTimeout(() => {
        toast.classList.remove("active");
    }, 1500);
}

document
    .querySelectorAll("[data-status]")
    .forEach(button => {
        button.addEventListener("click", () => {
            toggleStatus(button.dataset.status, button);
        });
    });

document
    .querySelectorAll("[data-payment]")
    .forEach(button => {
        button.addEventListener("click", () => {
            togglePaymentFilter(button.dataset.payment, button);
        });
    });

document
    .querySelectorAll("[data-view]")
    .forEach(button => {
        button.addEventListener("click", () => {
            setView(button.dataset.view, button);
        });
    });

document
    .getElementById("search")
    .addEventListener("input", applyFilters);

document
    .getElementById("sortSelect")
    .addEventListener("change", applyFilters);

document
    .getElementById("transportFilter")
    .addEventListener("change", applyFilters);

loadShipments();

</script>

</body>
</html>
