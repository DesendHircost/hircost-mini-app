<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hircost Logistics</title>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    padding:16px;
    background:#d7d8da;
    color:#111827;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

.bg-disc{
    position:fixed;
    width:760px;
    height:760px;
    right:-260px;
    top:-170px;
    border-radius:50%;
    background:radial-gradient(circle at 50% 50%,
        rgba(235,246,255,0.95) 0%,
        rgba(130,190,220,0.85) 28%,
        rgba(25,35,42,0.95) 58%,
        rgba(5,8,10,0.98) 100%);
    border:18px solid rgba(12,16,20,0.9);
    box-shadow:0 0 0 8px rgba(255,255,255,0.18),0 30px 90px rgba(0,0,0,0.35);
    animation:spin 38s linear infinite;
    z-index:0;
    opacity:0.72;
}

.bg-disc::before{
    content:"";
    position:absolute;
    inset:90px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.28);
}

.bg-disc::after{
    content:"";
    position:absolute;
    inset:220px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.22);
    box-shadow:0 0 0 80px rgba(255,255,255,0.04);
}

@keyframes spin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

.wrapper{ position:relative; z-index:2; }

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
}

h1{
    margin:0;
    font-size:24px;
    color:#111827;
}

.search-btn{
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,0.72);
    color:#111827;
    font-size:18px;
    box-shadow:0 8px 24px rgba(0,0,0,0.12);
}

.search-box{
    display:none;
    margin-bottom:10px;
}

.search-box.active{ display:block; }

input{
    width:100%;
    padding:12px;
    border:1px solid rgba(17,24,39,0.12);
    border-radius:12px;
    margin-bottom:10px;
    background:rgba(255,255,255,0.78);
    color:#111827;
    font-size:15px;
    outline:none;
}

.status-filters{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:8px;
    margin-bottom:12px;
}

.filter-chip{
    border:none;
    border-radius:999px;
    padding:10px 14px;
    background:rgba(255,255,255,0.7);
    color:#111827;
    font-size:13px;
    white-space:nowrap;
    cursor:pointer;
    transition:0.2s;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.filter-chip.active{
    background:#111827;
    color:white;
}

.summary{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:8px;
    margin-bottom:10px;
}

.summary-card{
    min-width:190px;
    background:rgba(255,255,255,0.74);
    border:1px solid rgba(17,24,39,0.12);
    border-radius:16px;
    padding:14px;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.summary-card span{
    display:block;
    color:#6b7280;
    font-size:12px;
    margin-bottom:5px;
}

.summary-card b{
    font-size:22px;
    color:#111827;
}

.counter{
    color:#4b5563;
    font-size:13px;
    margin-bottom:12px;
}

.card{
    background:rgba(255,255,255,0.76);
    border:1px solid rgba(17,24,39,0.12);
    border-radius:16px;
    margin-bottom:10px;
    overflow:hidden;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.card-header{
    padding:14px;
    cursor:pointer;
}

.card-title{
    font-size:16px;
    font-weight:bold;
    margin-bottom:8px;
    color:#111827;
}

.card-subtitle{
    font-size:13px;
    color:#4b5563;
}

.card-body{
    display:none;
    padding:0 14px 14px 14px;
    border-top:1px solid rgba(17,24,39,0.08);
}

.card.open .card-body{ display:block; }

.row{
    display:flex;
    justify-content:space-between;
    gap:10px;
    padding:8px 0;
    border-bottom:1px solid rgba(17,24,39,0.07);
    font-size:14px;
}

.row span:first-child{ color:#6b7280; }

.row b{
    color:#111827;
    text-align:right;
}

.status{
    display:inline-block;
    margin-top:10px;
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
}

.green{ background:#dcfce7; color:#166534; }
.orange{ background:#fef3c7; color:#92400e; }
.red{ background:#fee2e2; color:#991b1b; }
.gray{ background:#e5e7eb; color:#374151; }

.pay-badge{
    display:inline-block;
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
    white-space:nowrap;
}

.pay-paid{
    background:#dcfce7;
    color:#166534;
}

.pay-unpaid{
    background:#fee2e2;
    color:#991b1b;
}

.empty{
    color:#6b7280;
    text-align:center;
    margin-top:30px;
}

@media (max-width:600px){
    .bg-disc{
        width:620px;
        height:620px;
        right:-320px;
        top:-180px;
        opacity:0.55;
    }

    .summary-card{ min-width:170px; }
}
</style>
</head>

<body>

<div class="bg-disc"></div>

<div class="wrapper">

<div class="header">
    <h1>Hircost поставки</h1>
    <button class="search-btn" onclick="toggleSearch()">🔎</button>
</div>

<div class="search-box" id="searchBox">
    <input type="text" id="search" placeholder="Поиск: спецификация, товар, ТК">
</div>

<div class="status-filters">
    <button class="filter-chip" data-status="В пути">В пути</button>
    <button class="filter-chip" data-status="Принята">Принята</button>
    <button class="filter-chip" data-status="Задерживается">Задерживается</button>
</div>

<div class="summary">
    <div class="summary-card">
        <span>Штук в пути</span>
        <b id="qtyInTransit">0</b>
    </div>

    <div class="summary-card">
        <span>Поставок в пути</span>
        <b id="countInTransit">0</b>
    </div>

    <div class="summary-card">
        <span>Сумма транспорта в пути</span>
        <b id="transportSumTransit">0 ₽</b>
    </div>
</div>

<div class="counter" id="counter"></div>
<div id="shipments"></div>

</div>

<script>
const SHEET_URL =
"https://docs.google.com/spreadsheets/d/1mmW-HwveJCRQFIFCEHjj7mfJ2-2WqwvEaDokI4VQFQs/export?format=csv&gid=1362126320";

let shipmentsData = [];
let selectedStatuses = [];

function toggleSearch(){
    document.getElementById("searchBox").classList.toggle("active");
}

function clean(value){
    if(value === undefined || value === null) return "";
    return String(value).trim();
}

function normalize(value){
    return clean(value).toLowerCase();
}

function getField(obj, names){
    for(const name of names){
        if(obj[name] !== undefined) return obj[name];
    }

    const keys = Object.keys(obj);

    for(const name of names){
        const found = keys.find(k => normalize(k) === normalize(name));
        if(found) return obj[found];
    }

    return "";
}

function parseNumber(value){
    if(!value) return 0;

    return Number(
        String(value)
        .replace(/\s/g, "")
        .replace(",", ".")
        .replace(/[^\d.]/g, "")
    ) || 0;
}

function parseCSV(text){
    const rows = [];
    let row = [];
    let cell = "";
    let insideQuotes = false;

    for(let i = 0; i < text.length; i++){
        const char = text[i];
        const next = text[i + 1];

        if(char === '"' && insideQuotes && next === '"'){
            cell += '"';
            i++;
        } else if(char === '"'){
            insideQuotes = !insideQuotes;
        } else if(char === "," && !insideQuotes){
            row.push(cell);
            cell = "";
        } else if((char === "\n" || char === "\r") && !insideQuotes){
            if(cell || row.length){
                row.push(cell);
                rows.push(row);
                row = [];
                cell = "";
            }
        } else {
            cell += char;
        }
    }

    if(cell || row.length){
        row.push(cell);
        rows.push(row);
    }

    return rows;
}

async function loadShipments(){
    const response = await fetch(SHEET_URL);
    const csv = await response.text();
    const rows = parseCSV(csv);
    const headers = rows[0];

    shipmentsData = rows
        .slice(1)
        .map(cols => {
            const obj = {};

            headers.forEach((header, index) => {
                obj[clean(header)] = clean(cols[index]);
            });

            return {
                status: getField(obj, ["Статус"]),
                spec: getField(obj, ["Спецификация"]),
                item: getField(obj, ["Товар"]),
                qty: getField(obj, ["Общее кол-во в заказе"]),
                weight: getField(obj, ["Вес по накладной, КГ", "Вес по накладной, кг"]),
                transport: getField(obj, ["Транспортная компания"]),
                transportSum: getField(obj, ["Сумма за транспорт"]),
                readyDate: getField(obj, ["Дата готовности/отгрузки"]),
                arrivalDate: getField(obj, ["Дата прихода/Срок"]),
                priceKg: getField(obj, ["Цена за кг"]),
                specPayment: getField(obj, ["оплата по спецификации", "Оплата по спецификации"]),
                transportPayment: getField(obj, ["Оплата за транспорт", "оплата за транспорт"])
            };
        })
        .filter(item => item.spec);

    applyFilters();
}

function getStatusClass(status){
    const s = normalize(status);

    if(s === "принята") return "green";
    if(s === "в пути") return "orange";
    if(s === "задерживается") return "red";

    return "gray";
}

function isInTransitStatus(status){
    const s = normalize(status);
    return s === "в пути" || s === "задерживается";
}

function isPaid(value){
    const v = normalize(value);

    return (
        v === "оплачено" ||
        v === "оплачен" ||
        v === "да" ||
        v === "paid" ||
        v === "+"
    );
}

function paymentBadge(value){
    const text = clean(value) || "Не оплачено";

    if(isPaid(text)){
        return `<span class="pay-badge pay-paid">${text}</span>`;
    }

    return `<span class="pay-badge pay-unpaid">${text}</span>`;
}

function updateSummary(){
    const inTransit = shipmentsData.filter(item =>
        isInTransitStatus(item.status)
    );

    const qty = inTransit.reduce((sum, item) =>
        sum + parseNumber(item.qty), 0
    );

    const transportSum = inTransit.reduce((sum, item) =>
        sum + parseNumber(item.transportSum), 0
    );

    document.getElementById("qtyInTransit").innerText =
        qty.toLocaleString("ru-RU");

    document.getElementById("countInTransit").innerText =
        inTransit.length;

    document.getElementById("transportSumTransit").innerText =
        transportSum.toLocaleString("ru-RU") + " ₽";
}

function renderShipments(data){
    const container = document.getElementById("shipments");
    const counter = document.getElementById("counter");

    container.innerHTML = "";
    counter.innerText = `Найдено: ${data.length}`;

    updateSummary();

    if(data.length === 0){
        container.innerHTML = `<div class="empty">Ничего не найдено</div>`;
        return;
    }

    data.forEach((item, index) => {
        const statusClass = getStatusClass(item.status);

        const specTitle = item.spec.replace(
            "Спецификация ",
            "Спецификация №"
        );

        container.innerHTML += `
            <div class="card" id="card-${index}">
                <div class="card-header" onclick="toggleCard(${index})">
                    <div class="card-title">${specTitle}</div>
                    <div class="card-subtitle">${item.status} · ${item.arrivalDate}</div>
                    <div class="status ${statusClass}">${item.status}</div>
                </div>

                <div class="card-body">
                    <div class="row"><span>Товар</span><b>${item.item || "-"}</b></div>
                    <div class="row"><span>Кол-во</span><b>${item.qty || "-"}</b></div>
                    <div class="row"><span>Вес</span><b>${item.weight || "-"}</b></div>
                    <div class="row"><span>ТК</span><b>${item.transport || "-"}</b></div>
                    <div class="row"><span>Сумма транспорта</span><b>${item.transportSum || "-"}</b></div>
                    <div class="row"><span>Дата готовности</span><b>${item.readyDate || "-"}</b></div>
                    <div class="row"><span>Дата прихода/срок</span><b>${item.arrivalDate || "-"}</b></div>
                    <div class="row"><span>Цена за кг</span><b>${item.priceKg || "-"}</b></div>
                    <div class="row"><span>Оплата по спецификации</span><b>${paymentBadge(item.specPayment)}</b></div>
                    <div class="row"><span>Оплата за транспорт</span><b>${paymentBadge(item.transportPayment)}</b></div>
                </div>
            </div>
        `;
    });
}

function toggleCard(index){
    const card = document.getElementById(`card-${index}`);
    card.classList.toggle("open");
}

function applyFilters(){
    const searchValue = document.getElementById("search").value.toLowerCase().trim();

    let filtered = shipmentsData;

    if(searchValue){
        filtered = filtered.filter(item =>
            item.spec.toLowerCase().includes(searchValue) ||
            item.item.toLowerCase().includes(searchValue) ||
            item.transport.toLowerCase().includes(searchValue)
        );
    }

    if(selectedStatuses.length > 0){
        filtered = filtered.filter(item =>
            selectedStatuses.includes(item.status)
        );
    }

    renderShipments(filtered);
}

function toggleStatus(status, button){
    if(selectedStatuses.includes(status)){
        selectedStatuses = selectedStatuses.filter(s => s !== status);
        button.classList.remove("active");
    } else {
        selectedStatuses.push(status);
        button.classList.add("active");
    }

    applyFilters();
}

document.querySelectorAll(".filter-chip").forEach(button => {
    button.addEventListener("click", () => {
        toggleStatus(button.dataset.status, button);
    });
});

document.getElementById("search").addEventListener("input", applyFilters);

loadShipments();
</script>

</body>
</html>
